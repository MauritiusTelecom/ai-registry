# =============================================================================
# /etc/nginx/sites-available/airegistry.mu
# -----------------------------------------------------------------------------
# Nginx site config for the AI Registry public portal.
#
# Install:
#   sudo cp deploy/nginx/airegistry.mu.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/airegistry.mu.conf \
#              /etc/nginx/sites-enabled/airegistry.mu.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue the certificate (rewrites the ssl_certificate paths in this file):
#   sudo certbot --nginx -d airegistry.mu -d www.airegistry.mu \
#        --redirect --hsts --staple-ocsp -m admin@airegistry.mu --agree-tos -n
#
# Certbot installs a renewal timer automatically (systemctl list-timers).
# =============================================================================

# Rate-limit zone shared across the API. 30 req/s sustained, with bursts
# absorbed at the location block. Adjust if your traffic profile differs.
limit_req_zone $binary_remote_addr zone=airegistry_api:10m rate=30r/s;

# Map for upstream readiness — used to fail fast if PM2 is down rather than
# 504-timing-out.
upstream airegistry_app {
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ----- HTTP: redirect everything to HTTPS -----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name airegistry.mu www.airegistry.mu;

    # certbot drops its HTTP-01 challenge files here.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS: reverse proxy to the Next.js process --------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name airegistry.mu www.airegistry.mu;

    # certbot will replace these two lines with the real cert paths on first
    # issuance. Until then, nginx -t will fail — run certbot before reload.
    ssl_certificate     /etc/letsencrypt/live/airegistry.mu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airegistry.mu/privkey.pem;

    # Mozilla "intermediate" profile (2024).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — once you're confident the cert chain is stable, increase max-age
    # to 31536000 and consider preload. Start conservative for first deploy.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Sensible default security headers. Tighten CSP after auditing inline
    # scripts/styles that Next emits.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP must match apps/portal/next.config.mjs and packages/core/src/lib/security/csp.ts
    # (production). Next also emits Content-Security-Policy; keep both identical.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Body size cap (uploads, JSON payloads).
    client_max_body_size 4m;

    # Gzip the proxied responses Next doesn't already compress.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.api+json image/svg+xml;

    # Long-cache Next's hashed static assets.
    location /_next/static/ {
        proxy_pass http://airegistry_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API: apply rate limiting.
    location /api/ {
        limit_req zone=airegistry_api burst=60 nodelay;
        proxy_pass http://airegistry_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Everything else: SSR + static pages.
    location / {
        proxy_pass http://airegistry_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Silence access-log noise from health checks.
    location = /api/health {
        access_log off;
        proxy_pass http://airegistry_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
