# Local development orchestration for the ai-registry reference implementation.
#
# Usage:
#
#   docker compose up -d postgres   # bring up the database only
#   docker compose up -d            # bring up database + app
#   docker compose down             # stop everything (data persists in volume)
#   docker compose down -v          # destructive — drops the volume
#
# The Postgres image creates a database named `airegistry` with a user
# `airegistry` whose password is `airegistry-dev`. The default `.env.example`
# already points DATABASE_URL at this instance.
#
# The `app` service builds from ./Dockerfile and runs the Next.js portal on
# port 3002. It waits for Postgres to be healthy before starting.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-airegistry-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airegistry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airegistry-dev}
      POSTGRES_DB: ${POSTGRES_DB:-airegistry}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - airegistry-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airegistry} -d ${POSTGRES_DB:-airegistry}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-airegistry-app}
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-3002}:3002"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-airegistry}:${POSTGRES_PASSWORD:-airegistry-dev}@postgres:5432/${POSTGRES_DB:-airegistry}?schema=registry"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  airegistry-pg-data:
    name: ${POSTGRES_VOLUME_NAME:-airegistry-pg-data}
