# Sovereign · Policies module — API contract
# Read-only sovereign view of admin-authored policies.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Policies API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-policies

paths:
  /sovereign/policies:
    get:
      summary: List sovereign-relevant policies (read-only subset of admin policies)
      operationId: listSovereignPolicies
      tags: [sovereign-policies]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Sovereign policies payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovPoliciesResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SovPolicy:
      type: object
      required: [id, name, scope, enforced, updated]
      properties:
        id:       { type: string, example: pol_egress }
        name:     { type: string }
        scope:    { type: string }
        enforced: { type: boolean }
        updated:  { type: string, format: date }

    SovPoliciesResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/SovPolicy' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
