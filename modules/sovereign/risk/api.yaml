# Sovereign · Risk module — API contract

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Risk API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-risk

paths:
  /sovereign/risk:
    get:
      summary: Get risk timeline + sector × tier coverage matrix
      operationId: getSovereignRiskPage
      tags: [sovereign-risk]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: weeks
          schema: { type: integer, minimum: 4, maximum: 52, default: 13 }
      responses:
        '200':
          description: Risk page payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovRiskResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/risk/week/{day}:
    parameters:
      - in: path
        name: day
        required: true
        schema: { type: string }
        description: Display label of the week (e.g. 'May 07') or ISO week id (production preferred).
    get:
      summary: Get drill-down detail for a single risk week (production-only)
      operationId: getSovereignRiskWeek
      tags: [sovereign-risk]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Week detail with contributing factors
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RiskWeekDetail' }
        '404':
          description: Week not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    RiskWeek:
      type: object
      required: [day, score]
      properties:
        day:   { type: string, example: 'May 07' }
        score: { type: integer, minimum: 0 }

    RiskWeekDetail:
      allOf:
        - $ref: '#/components/schemas/RiskWeek'
        - type: object
          required: [contributors]
          properties:
            contributors:
              type: array
              items:
                type: object
                required: [factor, weight]
                properties:
                  factor: { type: string, enum: [incident, policy-violation, flag, review-backlog, cross-border] }
                  weight: { type: number, minimum: 0, maximum: 1 }
                  note:   { type: string }

    SectorTierMatrix:
      type: object
      required: [sectors, tiers, data, max]
      properties:
        sectors:
          type: array
          items: { type: string }
        tiers:
          type: array
          items: { type: string }
        data:
          type: array
          items:
            type: array
            items: { type: integer }
        max: { type: integer }

    SovRiskResponse:
      type: object
      required: [risk, heatmap, methodologyVersion, generatedAt]
      properties:
        risk:
          type: array
          items: { $ref: '#/components/schemas/RiskWeek' }
        heatmap:           { $ref: '#/components/schemas/SectorTierMatrix' }
        methodologyVersion: { type: string, example: 'risk-v0.4' }
        generatedAt:       { type: string, format: date-time }
