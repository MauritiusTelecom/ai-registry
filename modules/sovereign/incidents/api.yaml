# Sovereign · Incidents module — API contract
# Read-only sovereign view of admin/provider incidents elevated to sovereign oversight.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Incidents API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-incidents

paths:
  /sovereign/incidents:
    get:
      summary: List national-impact incidents under sovereign oversight
      operationId: listSovereignIncidents
      tags: [sovereign-incidents]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: sector
          schema: { type: string, enum: [all, education, finance, health, trade, logistics, agriculture, cross-cutting] }
        - in: query
          name: severity
          schema: { type: string, enum: [all, high, med, low] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Sovereign incidents page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovIncidentsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/incidents/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get incident detail with cross-links to admin / provider records
      operationId: getSovereignIncident
      tags: [sovereign-incidents]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SovIncident'
                  - type: object
                    properties:
                      adminFlagId:    { type: string, description: 'Cross-link to admin /flags row, if flag-originated.' }
                      providerInc:    { type: string, description: 'Cross-link to provider /incidents row, if reliability-originated.' }
                      timeline:
                        type: array
                        items:
                          type: object
                          required: [ts, actor, action, body]
                          properties:
                            ts:     { type: string, format: date-time }
                            actor:  { type: string }
                            action: { type: string, enum: [escalated, reviewed, comment, dropped, resolved] }
                            body:   { type: string }
        '404':
          description: Incident not found in this tenant's sovereign queue
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SovIncident:
      type: object
      required: [id, sector, target, kind, severity, opened]
      properties:
        id:       { type: string, example: inc_910 }
        sector:   { type: string, enum: [education, finance, health, trade, logistics, agriculture, cross-cutting] }
        target:   { type: string }
        kind:     { type: string }
        severity: { type: string, enum: [high, med, low] }
        opened:   { type: string, format: date }

    SovIncidentsResponse:
      type: object
      required: [rows, total, openCount, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/SovIncident' }
        total:     { type: integer }
        openCount: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
