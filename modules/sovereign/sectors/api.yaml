# Sovereign · Sectors module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Sectors API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-sectors

paths:
  /sovereign/sectors:
    get:
      summary: List sectors with current count and 30-day growth
      operationId: listSovereignSectors
      tags: [sovereign-sectors]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Sectors payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovSectorsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/sectors/{name}/series:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      summary: Per-sector series (production-only sparkline source)
      operationId: getSovereignSectorSeries
      tags: [sovereign-sectors]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: window
          schema: { type: string, enum: [30d, 90d, 365d], default: 30d }
      responses:
        '200':
          description: Series points for the named sector
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [day, count]
                  properties:
                    day:   { type: string, format: date }
                    count: { type: integer, minimum: 0 }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SectorCard:
      type: object
      required: [name, count, tier, growth]
      properties:
        name:   { type: string, example: 'Education' }
        count:  { type: integer, minimum: 0 }
        tier:   { type: string, enum: [Tier-1, Tier-2, Tier-3, Restricted] }
        growth: { type: string, example: '+12%' }

    SovSectorsResponse:
      type: object
      required: [rows, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/SectorCard' }
        generatedAt: { type: string, format: date-time }
