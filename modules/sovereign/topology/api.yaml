# Sovereign · Topology module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Topology API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-topology

paths:
  /sovereign/topology:
    get:
      summary: Get topology graph + dependency table for the active sovereign tenant
      operationId: getSovereignTopology
      tags: [sovereign-topology]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: window
          schema: { type: string, enum: [7d, 30d, 90d], default: 30d }
        - in: query
          name: kind
          schema: { type: string, enum: [all, mcp, tool, model-call], default: all }
      responses:
        '200':
          description: Topology payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovTopologyResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/topology/dependencies:
    get:
      summary: List dependencies (table only)
      operationId: listSovereignDependencies
      tags: [sovereign-topology]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: src
          schema: { type: string, description: 'Filter by exact src slug.' }
        - in: query
          name: dst
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string, enum: [all, mcp, tool, model-call] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        '200':
          description: Dependencies list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TopologyDependency' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    TopologyDependency:
      type: object
      required: [src, dst, kind]
      properties:
        src:  { type: string }
        dst:  { type: string }
        kind: { type: string, enum: [mcp, tool, model-call] }

    TopologyNode:
      type: object
      required: [id, x, y, kind]
      properties:
        id:   { type: string }
        x:    { type: number }
        y:    { type: number }
        kind: { type: string, enum: [agent, mcp, tool, model-ext] }

    TopologyGraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/TopologyNode' }
        edges:
          type: array
          items:
            type: array
            items: { type: string }
            minItems: 2
            maxItems: 2

    SovTopologyResponse:
      type: object
      required: [graph, dependencies, window, generatedAt]
      properties:
        graph:        { $ref: '#/components/schemas/TopologyGraph' }
        dependencies:
          type: array
          items: { $ref: '#/components/schemas/TopologyDependency' }
        window:       { type: string, enum: [7d, 30d, 90d] }
        generatedAt:  { type: string, format: date-time }
