# Sovereign · Reports module — API contract

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Reports API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-reports

paths:
  /sovereign/reports:
    get:
      summary: List sovereign-issued reports
      operationId: listSovereignReports
      tags: [sovereign-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Reports payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovReportsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/reports/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get report metadata + signed URL
      operationId: getSovereignReport
      tags: [sovereign-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Report detail with short-lived signed URL
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovReport' }
        '404':
          description: Report not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /sovereign/reports/{id}/file.pdf:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: 'Download' card action — PDF stream
      operationId: downloadSovereignReport
      tags: [sovereign-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SovReport:
      type: object
      required: [id, name, issued]
      properties:
        id:     { type: string, example: r1 }
        name:   { type: string }
        issued: { type: string, format: date }
        url:    { type: string, format: uri, description: 'Signed URL with short TTL.' }

    SovReportsResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/SovReport' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
