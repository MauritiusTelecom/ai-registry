# Sovereign · Settings module — API contract

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Settings API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-settings

paths:
  /sovereign/settings:
    get:
      summary: Get the sovereign profile
      operationId: getSovereignSettings
      tags: [sovereign-settings]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Sovereign profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    patch:
      summary: Patch the sovereign profile
      operationId: patchSovereignSettings
      tags: [sovereign-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/SovSettingsPatch' }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovProfile' }
        '409':
          description: Conflict — concurrent save
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SovProfile:
      type: object
      required: [operator, authority, reportingCadence, updatedAt, updatedBy]
      properties:
        operator:         { type: string, example: 'Marie Laurent' }
        authority:        { type: string, example: 'Ministry of Finance, Republic of Mauritius' }
        reportingCadence: { type: string, enum: [weekly, monthly, quarterly] }
        updatedAt:        { type: string, format: date-time }
        updatedBy:        { type: string, format: email }

    SovSettingsPatch:
      type: object
      properties:
        operator:         { type: string }
        authority:        { type: string }
        reportingCadence: { type: string, enum: [weekly, monthly, quarterly] }
