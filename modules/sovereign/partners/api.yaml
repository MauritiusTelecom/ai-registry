# Sovereign · Partners module — API contract
# Read-only sovereign view of regional partners.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Sovereign Partners API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: sovereign-partners

paths:
  /sovereign/partners:
    get:
      summary: List regional partners with MOU dates and shared resource counts
      operationId: listSovereignPartners
      tags: [sovereign-partners]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: kind
          schema: { type: string, enum: [all, regional, sovereign, intergov] }
        - in: query
          name: status
          schema: { type: string, enum: [all, active, pending] }
          description: 'pending filters to MOUs in negotiation.'
      responses:
        '200':
          description: Partner list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SovPartnersResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /sovereign/partners/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
        description: 'URL-encoded partner display name.'
    get:
      summary: Get partner detail with shared-resource list
      operationId: getSovereignPartner
      tags: [sovereign-partners]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Partner detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SovPartner'
                  - type: object
                    properties:
                      sharedResources:
                        type: array
                        items:
                          type: object
                          required: [airId, title]
                          properties:
                            airId: { type: string }
                            title: { type: string }
                      mouUrl:
                        type: string
                        format: uri
                        description: 'Signed URL to the MOU PDF.'
                      contacts:
                        type: array
                        items:
                          type: object
                          required: [name, role]
                          properties:
                            name:  { type: string }
                            role:  { type: string }
                            email: { type: string, format: email }
        '404':
          description: Partner not found in this tenant's roster
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks sovereign role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    SovPartner:
      type: object
      required: [name, kind, resources, mou]
      properties:
        name:      { type: string, example: 'IndianOceanCom' }
        kind:      { type: string, enum: [regional, sovereign, intergov] }
        resources: { type: integer, minimum: 0 }
        mou:       { type: string, description: 'ISO date YYYY-MM-DD OR the literal "pending".' }

    SovPartnersResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/SovPartner' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
