# Provider · Settings module — API contract
# Auth: provider role + owner of the org for writes.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Settings API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-settings

paths:
  /provider/settings:
    get:
      summary: Get the full provider-org settings object
      operationId: getProviderSettings
      tags: [provider-settings]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Provider settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSettings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/settings/organisation:
    patch:
      summary: Patch the Organisation card
      operationId: patchProviderOrganisation
      tags: [provider-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/OrganisationSettingsPatch' }
      responses:
        '200':
          description: Updated settings (whole object echoed back)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSettings' }
        '409':
          description: 'Domain change requires re-verification (POST /domain-verify first).'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /provider/settings/notifications:
    patch:
      summary: Patch the Notifications card
      operationId: patchProviderNotifications
      tags: [provider-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/NotificationsSettingsPatch' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSettings' }

  /provider/settings/domain-verify:
    post:
      summary: Issue a challenge to re-verify a new domain
      operationId: issueProviderDomainChallenge
      tags: [provider-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newDomain, proofChannel]
              properties:
                newDomain:    { type: string }
                proofChannel: { type: string, enum: [dns-txt, signed-manifest, https-callback] }
      responses:
        '201':
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
                required: [token, expiresAt]
                properties:
                  token:     { type: string }
                  expiresAt: { type: string, format: date-time }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role / owner role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    OrganisationSettings:
      type: object
      required: [displayName, domain, publicBio]
      properties:
        displayName: { type: string, example: 'eduMu' }
        domain:      { type: string, example: 'edu.gov.mu' }
        publicBio:   { type: string, maxLength: 240 }

    NotificationsSettings:
      type: object
      required: [incidentChannel, onCallEmail]
      properties:
        incidentChannel: { type: string, example: '#edu-air-ops (Slack)' }
        onCallEmail:     { type: string, format: email }
        webhook:         { type: string, format: uri }

    ProviderSettings:
      type: object
      required: [organisation, notifications, updatedAt, updatedBy]
      properties:
        organisation:  { $ref: '#/components/schemas/OrganisationSettings' }
        notifications: { $ref: '#/components/schemas/NotificationsSettings' }
        updatedAt:     { type: string, format: date-time }
        updatedBy:     { type: string, format: email }

    OrganisationSettingsPatch:
      type: object
      properties:
        displayName: { type: string }
        domain:      { type: string }
        publicBio:   { type: string, maxLength: 240 }

    NotificationsSettingsPatch:
      type: object
      properties:
        incidentChannel: { type: string }
        onCallEmail:     { type: string, format: email }
        webhook:         { type: string, format: uri }
