# Provider · Docs module — API contract

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Docs API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-docs

paths:
  /provider/docs:
    get:
      summary: List provider documentation cards
      operationId: listProviderDocs
      tags: [provider-docs]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: kind
          schema: { type: string, enum: [all, guide, reference, runbook, tutorial, changelog] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Doc cards
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderDocsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    DocCard:
      type: object
      required: [id, title, kind, updated]
      properties:
        id:      { type: string, example: d_001 }
        title:   { type: string }
        kind:    { type: string, enum: [guide, reference, runbook, tutorial, changelog] }
        updated: { type: string, format: date }
        url:     { type: string, format: uri }

    ProviderDocsResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/DocCard' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
