# Provider · Submissions module — API contract
# All endpoints scoped to the active provider tenant via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Submissions API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-submissions

paths:
  /provider/submissions:
    get:
      summary: List submissions made by the active provider
      operationId: listProviderSubmissions
      tags: [provider-submissions]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [all, pending, review, approved, rejected, withdrawn] }
        - in: query
          name: stage
          schema: { type: string, enum: [all, sovereignty, evaluation, safety] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Submissions page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSubmissionsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/submissions/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a submission with reviewer comments (decision history)
      operationId: getProviderSubmission
      tags: [provider-submissions]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Submission detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Submission'
                  - type: object
                    properties:
                      decisions:
                        type: array
                        items:
                          type: object
                          required: [decidedAt, decidedBy, decision, body]
                          properties:
                            decidedAt: { type: string, format: date-time }
                            decidedBy: { type: string }
                            decision:  { type: string, enum: [approve, reject, withdraw] }
                            body:      { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /provider/submissions/{id}/withdraw:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Withdraw an open submission
      operationId: withdrawProviderSubmission
      tags: [provider-submissions]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 12 }
      responses:
        '200':
          description: Withdrawn submission
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Submission' }
        '409':
          description: Cannot withdraw — submission is already terminal (approved / rejected)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Submission id not found in this provider
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    Submission:
      type: object
      required: [id, target, stage, submitted, status, age]
      properties:
        id:        { type: string, example: s_001 }
        target:    { type: string, example: 'agent/curriculum-tutor v0.4.0' }
        stage:     { type: string, enum: [sovereignty, evaluation, safety] }
        submitted: { type: string, format: date }
        status:    { type: string, enum: [pending, review, approved, rejected, withdrawn] }
        age:       { type: string, example: '4h' }

    ProviderSubmissionsResponse:
      type: object
      required: [rows, total, counters, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/Submission' }
        total: { type: integer }
        counters:
          type: object
          required: [pending, review, approved, rejected, withdrawn]
          properties:
            pending:   { type: integer }
            review:    { type: integer }
            approved:  { type: integer }
            rejected:  { type: integer }
            withdrawn: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
