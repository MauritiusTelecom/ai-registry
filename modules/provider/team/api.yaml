# Provider · Team module — API contract
# Auth: see airegistry-specs/shared/auth.md (provider role for read; owner role for writes).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Team API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-team

paths:
  /provider/team:
    get:
      summary: List members of the active provider org
      operationId: listProviderTeam
      tags: [provider-team]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderTeamResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/team/invite:
    post:
      summary: 'Invite' header action
      operationId: inviteProviderTeamMember
      tags: [provider-team]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamInvite' }
      responses:
        '201':
          description: Invitation sent (or seat created for service members)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }

  /provider/team/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a member
      operationId: getProviderTeamMember
      tags: [provider-team]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Member
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      summary: Edit role
      operationId: patchProviderTeamMember
      tags: [provider-team]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [owner, editor, service] }
      responses:
        '200':
          description: Updated member
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamMember' }
        '422':
          description: 'Cannot demote the only owner'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    delete:
      summary: Remove a member from the org
      operationId: deleteProviderTeamMember
      tags: [provider-team]
      security: [{ bearerAuth: [] }]
      responses:
        '204':
          description: Member removed
        '422':
          description: 'Cannot remove the only owner'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role / owner role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Member id not found in this provider
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    TeamMember:
      type: object
      required: [id, name, email, role]
      properties:
        id:    { type: string, example: t1 }
        name:  { type: string }
        email: { type: string, format: email }
        role:  { type: string, enum: [owner, editor, service] }

    TeamInvite:
      type: object
      required: [email, role]
      properties:
        email:   { type: string, format: email }
        role:    { type: string, enum: [owner, editor, service] }
        name:    { type: string, description: 'Required for service members.' }
        expires: { type: string, format: date-time, description: 'Optional; service members SHOULD set explicit expiry.' }

    ProviderTeamResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
