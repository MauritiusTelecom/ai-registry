# Provider · Resources module — API contract
# All endpoints scoped to the active provider tenant via session.
# Auth: see airegistry-specs/shared/auth.md (provider role required).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Resources API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-resources

paths:
  /provider/resources:
    get:
      summary: List resources owned by the active provider
      operationId: listProviderResources
      tags: [provider-resources]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [all, verified, review, experimental, isolated, archived, draft] }
        - in: query
          name: kind
          schema: { type: string, enum: [all, mcp-server, agent, tool, model] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Provider resources page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderResourcesResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/resources/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a provider resource (joins canonical Resource with metrics)
      operationId: getProviderResource
      tags: [provider-resources]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Provider resource detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ProviderResource'
                  - type: object
                    properties:
                      desc:    { type: string }
                      region:  { type: string }
                      risk:    { type: string, enum: [low, med, high] }
                      versions:
                        type: array
                        items:
                          type: object
                          required: [version, publishedAt]
                          properties:
                            version:     { type: string }
                            publishedAt: { type: string, format: date-time }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      summary: Edit non-version fields (e.g. description, region)
      operationId: patchProviderResource
      tags: [provider-resources]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                desc:   { type: string, maxLength: 240 }
                region: { type: string }
      responses:
        '200':
          description: Updated resource
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderResource' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Resource id not found in this provider's catalogue
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    ProviderResource:
      type: object
      required: [id, slug, kind, status, sov, updated, usage, latency, errors, version]
      properties:
        id:       { type: string, example: p_001 }
        slug:     { type: string, example: mcp/edu-curriculum }
        kind:     { type: string, enum: [mcp-server, agent, tool, model] }
        status:   { type: string, enum: [verified, review, experimental, isolated, archived, draft] }
        sov:      { type: string }
        updated:  { type: string, format: date }
        usage:    { type: string }
        latency:  { type: string }
        errors:   { type: string }
        version:  { type: string, example: v3.2.0 }

    ProviderResourcesResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/ProviderResource' }
        total: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
