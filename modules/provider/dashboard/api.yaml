# Provider · Dashboard module — API contract
# All endpoints are scoped to the active provider tenant via the session.
# Auth: see airegistry-specs/shared/auth.md (provider role required).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Dashboard API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-dashboard
    description: Aggregated read-only data for the provider landing page.

paths:
  /provider/dashboard:
    get:
      summary: Get provider dashboard payload
      operationId: getProviderDashboard
      tags: [provider-dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Dashboard payload (provider scoped)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderDashboardResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/summary:
    get:
      summary: Get the four StatCard counters for the provider
      operationId: getProviderSummary
      tags: [provider-dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Summary payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderDashboardSummary' }

  /provider/usage:
    get:
      summary: Per-kind usage series
      operationId: getProviderUsage
      tags: [provider-dashboard]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: window
          schema: { type: string, enum: [7d, 30d, 90d], default: 7d }
      responses:
        '200':
          description: Usage series
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSeries' }

  /provider/submissions/open:
    get:
      summary: Open submissions slice (non-approved)
      operationId: getOpenSubmissions
      tags: [provider-dashboard]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Submissions whose status is not 'approved', ordered by submitted desc
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Submission' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    ProviderDashboardResponse:
      type: object
      required: [summary, usage, openSubmissions, generatedAt]
      properties:
        summary:   { $ref: '#/components/schemas/ProviderDashboardSummary' }
        usage:     { $ref: '#/components/schemas/UsageSeries' }
        openSubmissions:
          type: array
          items: { $ref: '#/components/schemas/Submission' }
        generatedAt: { type: string, format: date-time }

    ProviderDashboardSummary:
      type: object
      required:
        - resourcesLive
        - resourcesLiveDelta7d
        - calls7d
        - calls7dDeltaPct
        - uptime90d
        - uptime90dDelta
        - openSubmissions
        - openSubmissionsDelta7d
      properties:
        resourcesLive:           { type: integer, example: 3 }
        resourcesLiveDelta7d:    { type: integer, example: 1 }
        calls7d:                 { type: string,  example: '21.5k' }
        calls7dDeltaPct:         { type: string,  example: '+12%' }
        uptime90d:               { type: string,  example: '99.97%' }
        uptime90dDelta:          { type: string,  example: '0' }
        openSubmissions:         { type: integer, example: 2 }
        openSubmissionsDelta7d:  { type: integer, example: 1 }

    UsageSeries:
      type: array
      items:
        type: object
        required: [day, mcp, tool, agent]
        properties:
          day:   { type: string, enum: [Mon, Tue, Wed, Thu, Fri, Sat, Sun] }
          mcp:   { type: integer }
          tool:  { type: integer }
          agent: { type: integer }
      minItems: 7
      maxItems: 7

    Submission:
      type: object
      required: [id, target, stage, submitted, status, age]
      properties:
        id:        { type: string, example: s_001 }
        target:    { type: string, example: 'tool/lesson-search' }
        stage:     { type: string, enum: [sovereignty, evaluation, safety] }
        submitted: { type: string, format: date }
        status:    { type: string, enum: [pending, review, approved] }
        age:       { type: string, example: '4h' }
