# Provider · Billing module — API contract

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Provider Billing API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: provider-billing

paths:
  /provider/billing:
    get:
      summary: List billing statements for the active provider
      operationId: listProviderBilling
      tags: [provider-billing]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 60, default: 24 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Statements page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderBillingResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /provider/billing/{periodIso}:
    parameters:
      - in: path
        name: periodIso
        required: true
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}$' }
        description: 'YYYY-MM'
    get:
      summary: Get statement detail (with line items + invoice URL when paid tier)
      operationId: getProviderBillingStatement
      tags: [provider-billing]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Statement detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingStatementDetail' }
        '404': { $ref: '#/components/responses/NotFound' }

  /provider/billing/{periodIso}/invoice.pdf:
    parameters:
      - in: path
        name: periodIso
        required: true
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}$' }
    get:
      summary: Download the PDF invoice (paid tiers only)
      operationId: downloadProviderInvoice
      tags: [provider-billing]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '404':
          description: No invoice exists (sovereign-tier statements have none)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /provider/billing/{periodIso}/dispute:
    parameters:
      - in: path
        name: periodIso
        required: true
        schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}$' }
    post:
      summary: Open a dispute on a statement (production-only)
      operationId: disputeProviderBillingStatement
      tags: [provider-billing]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 12 }
      responses:
        '200':
          description: Statement now in 'disputed' state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BillingStatement' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks provider role / owner role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Statement / invoice not found
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    BillingStatement:
      type: object
      required: [period, usage, tier, amount, status]
      properties:
        period: { type: string, example: 'Apr 2026' }
        usage:  { type: string, example: '94.2k calls' }
        tier:   { type: string, example: 'Sovereign' }
        amount: { type: string, example: 'MUR 0' }
        status: { type: string, enum: [covered, paid, due, overdue, disputed] }

    BillingStatementDetail:
      allOf:
        - $ref: '#/components/schemas/BillingStatement'
        - type: object
          required: [periodIso, usageCount, amountMinorUnits, currency]
          properties:
            periodIso:        { type: string, pattern: '^[0-9]{4}-[0-9]{2}$' }
            usageCount:       { type: integer, minimum: 0 }
            amountMinorUnits: { type: integer, minimum: 0 }
            currency:         { type: string, minLength: 3, maxLength: 3 }
            invoiceUrl:       { type: string, format: uri }
            lineItems:
              type: array
              items:
                type: object
                required: [label, count, amountMinorUnits]
                properties:
                  label:            { type: string }
                  count:            { type: integer }
                  amountMinorUnits: { type: integer }

    ProviderBillingResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/BillingStatement' }
        total: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
