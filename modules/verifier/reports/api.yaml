# Verifier · Reports module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Verifier Reports API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: verifier-reports

paths:
  /verifier/reports:
    get:
      summary: List verifier-collegium reports
      operationId: listVerifierReports
      tags: [verifier-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Reports payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifierReportsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      summary: 'Draft report' header action — create a draft (status not signed)
      operationId: draftVerifierReport
      tags: [verifier-reports]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, kind]
              properties:
                name: { type: string }
                kind: { type: string, enum: [quarterly, incident, annual] }
      responses:
        '201':
          description: Draft created (signed === false until signed by collegium)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerReport' }

  /verifier/reports/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get report metadata + signed URL
      operationId: getVerifierReport
      tags: [verifier-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerReportDetail' }
        '404':
          description: Not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /verifier/reports/{id}/file.pdf:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: 'Download PDF' card action
      operationId: downloadVerifierReport
      tags: [verifier-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /verifier/reports/{id}/sign:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Co-sign a draft report (requires sovereignty-board scope)
      operationId: signVerifierReport
      tags: [verifier-reports]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Signature added; if the threshold is met, signed flips to true
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerReport' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks verifier role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    VerReport:
      type: object
      required: [id, name, kind, issued, signed]
      properties:
        id:     { type: string, example: rpt_2026_q2 }
        name:   { type: string }
        kind:   { type: string, enum: [quarterly, incident, annual] }
        issued: { type: string, format: date }
        signed: { type: boolean }
        url:    { type: string, format: uri }

    VerReportDetail:
      allOf:
        - $ref: '#/components/schemas/VerReport'
        - type: object
          properties:
            signers:
              type: array
              items:
                type: object
                required: [name, collegium, signedAt, keyFingerprint]
                properties:
                  name:           { type: string }
                  collegium:      { type: string }
                  signedAt:       { type: string, format: date-time }
                  keyFingerprint: { type: string }
            embargoUntil: { type: string, format: date }
            draftAuthor:  { type: string, format: email }

    VerifierReportsResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/VerReport' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
