# Verifier · Dashboard module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Verifier Dashboard API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: verifier-dashboard

paths:
  /verifier/dashboard:
    get:
      summary: Get verifier dashboard payload
      operationId: getVerifierDashboard
      tags: [verifier-dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerDashboardResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /verifier/summary:
    get:
      summary: Four StatCard counters
      operationId: getVerifierSummary
      tags: [verifier-dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerDashboardSummary' }

  /verifier/queue/top:
    get:
      summary: Top-of-queue slice for the dashboard card
      operationId: getVerifierQueueTop
      tags: [verifier-dashboard]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 4 }
      responses:
        '200':
          description: Top-of-queue rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReviewQueueRow' }

  /verifier/redteam/active:
    get:
      summary: Active red-team findings (status !== 'resolved')
      operationId: getVerifierRedteamActive
      tags: [verifier-dashboard]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Active red-team findings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RedteamFinding' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks verifier role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    VerDashboardSummary:
      type: object
      required: [openReviews, openReviewsDelta7d, decided30d, decided30dDelta, passRate, passRateDeltaPP, openRedteam, openRedteamDelta]
      properties:
        openReviews:        { type: integer, example: 5 }
        openReviewsDelta7d: { type: integer, example: 2 }
        decided30d:         { type: integer, example: 42 }
        decided30dDelta:    { type: integer, example: 6 }
        passRate:           { type: string,  example: '74%' }
        passRateDeltaPP:    { type: string,  example: '-3pp' }
        openRedteam:        { type: integer, example: 2 }
        openRedteamDelta:   { type: string,  example: '0' }

    ReviewQueueRow:
      type: object
      required: [id, target, kind, stage, priority, queued, age, provider]
      properties:
        id:       { type: string, example: rev_8821 }
        target:   { type: string }
        kind:     { type: string, enum: [mcp-server, agent, tool, model] }
        stage:    { type: string, enum: [sovereignty, evaluation, safety] }
        priority: { type: string, enum: [high, med, low] }
        queued:   { type: string, format: date }
        age:      { type: string, example: '1d' }
        provider: { type: string }

    RedteamFinding:
      type: object
      required: [id, target, vector, severity, status, opened]
      properties:
        id:       { type: string, example: rt_44 }
        target:   { type: string }
        vector:   { type: string }
        severity: { type: string, enum: [high, med, low] }
        status:   { type: string, enum: [open, review, resolved] }
        opened:   { type: string, format: date }

    VerDashboardResponse:
      type: object
      required: [summary, queueTop, activeRedteam, generatedAt]
      properties:
        summary:       { $ref: '#/components/schemas/VerDashboardSummary' }
        queueTop:
          type: array
          items: { $ref: '#/components/schemas/ReviewQueueRow' }
        activeRedteam:
          type: array
          items: { $ref: '#/components/schemas/RedteamFinding' }
        generatedAt:   { type: string, format: date-time }
