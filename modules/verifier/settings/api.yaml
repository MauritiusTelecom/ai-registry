# Verifier · Settings module — API contract
# Per-verifier (NOT per tenant) settings.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Verifier Settings API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: verifier-settings

paths:
  /verifier/settings:
    get:
      summary: Get the active verifier's settings
      operationId: getVerifierSettings
      tags: [verifier-settings]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Verifier settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifierSettings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    patch:
      summary: Patch profile and/or preferences
      operationId: patchVerifierSettings
      tags: [verifier-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/VerifierSettingsPatch' }
      responses:
        '200':
          description: Updated settings (whole object echoed back)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifierSettings' }
        '409':
          description: Concurrent save conflict
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422':
          description: Validation error (unknown collegium, out-of-range maxConcurrent)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks verifier role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    ReviewerProfile:
      type: object
      required: [displayName, collegium, specialisation]
      properties:
        displayName:    { type: string, example: 'Sanjay Boodhoo' }
        collegium:      { type: string, example: 'Sovereignty Board' }
        specialisation: { type: string, example: 'legal · safety' }

    QueuePreferences:
      type: object
      required: [defaultStage, maxConcurrent]
      properties:
        defaultStage:  { type: string, enum: [sovereignty, evaluation, safety] }
        maxConcurrent: { type: integer, minimum: 1, maximum: 20 }

    VerifierSettings:
      type: object
      required: [profile, preferences, updatedAt, updatedBy]
      properties:
        profile:     { $ref: '#/components/schemas/ReviewerProfile' }
        preferences: { $ref: '#/components/schemas/QueuePreferences' }
        updatedAt:   { type: string, format: date-time }
        updatedBy:   { type: string, format: email }

    VerifierSettingsPatch:
      type: object
      properties:
        profile:
          type: object
          properties:
            displayName:    { type: string }
            collegium:      { type: string }
            specialisation: { type: string }
        preferences:
          type: object
          properties:
            defaultStage:  { type: string, enum: [sovereignty, evaluation, safety] }
            maxConcurrent: { type: integer, minimum: 1, maximum: 20 }
