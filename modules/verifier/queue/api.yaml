# Verifier · Queue module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Verifier Queue API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: verifier-queue

paths:
  /verifier/queue:
    get:
      summary: List the verifier's open review queue
      operationId: listVerifierQueue
      tags: [verifier-queue]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: stage
          schema: { type: string, enum: [all, sovereignty, evaluation, safety] }
        - in: query
          name: priority
          schema: { type: string, enum: [all, high, med, low] }
        - in: query
          name: provider
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Queue page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifierQueueResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /verifier/queue/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get full review detail (drawer payload)
      operationId: getVerifierQueueItem
      tags: [verifier-queue]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Review detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ReviewQueueRow'
                  - type: object
                    properties:
                      submissionBody: { type: string, description: 'The provider submission body — sovereign + evaluation + safety details.' }
                      evalRunIds:
                        type: array
                        items: { type: string }
                      attachedRedteamIds:
                        type: array
                        items: { type: string }
        '404':
          description: Review not found in this verifier's queue
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /verifier/queue/{id}/decision:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Decide a review (approve / reject / withdraw)
      operationId: decideVerifierQueueItem
      tags: [verifier-queue]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, body]
              properties:
                decision: { type: string, enum: [approve, reject, withdraw] }
                body:     { type: string, minLength: 12 }
      responses:
        '200':
          description: Review closed; row removed from queue
          content:
            application/json:
              schema:
                type: object
                required: [reviewId, auditId]
                properties:
                  reviewId: { type: string }
                  auditId:  { type: string }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks verifier role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    ReviewQueueRow:
      type: object
      required: [id, target, kind, stage, priority, queued, age, provider]
      properties:
        id:       { type: string, example: rev_8821 }
        target:   { type: string }
        kind:     { type: string, enum: [mcp-server, agent, tool, model] }
        stage:    { type: string, enum: [sovereignty, evaluation, safety] }
        priority: { type: string, enum: [high, med, low] }
        queued:   { type: string, format: date }
        age:      { type: string }
        provider: { type: string }

    VerifierQueueResponse:
      type: object
      required: [rows, total, counters, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/ReviewQueueRow' }
        total: { type: integer }
        counters:
          type: object
          required: [sovereignty, evaluation, safety]
          properties:
            sovereignty: { type: integer }
            evaluation:  { type: integer }
            safety:      { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
