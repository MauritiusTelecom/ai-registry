# Verifier · Benchmarks module — API contract
# Tenant-scoped via session.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Verifier Benchmarks API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: verifier-benchmarks

paths:
  /verifier/benchmarks:
    get:
      summary: List benchmarks
      operationId: listVerifierBenchmarks
      tags: [verifier-benchmarks]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: kind
          schema: { type: string, enum: [all, evaluation, safety] }
      responses:
        '200':
          description: Benchmarks payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifierBenchmarksResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      summary: 'New benchmark' header action
      operationId: createVerifierBenchmark
      tags: [verifier-benchmarks]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BenchmarkCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Benchmark' }

  /verifier/benchmarks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get benchmark detail (Inspect card action)
      operationId: getVerifierBenchmark
      tags: [verifier-benchmarks]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Benchmark detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Benchmark' }
        '404':
          description: Benchmark not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /verifier/benchmarks/{id}/items:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: List items for the benchmark suite
      operationId: listBenchmarkItems
      tags: [verifier-benchmarks]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Items page
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BenchmarkItem' }

  /verifier/benchmarks/{id}/runs:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: 'Run' card action — start a benchmark run against a target
      operationId: startBenchmarkRun
      tags: [verifier-benchmarks]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target: { type: string, description: 'Resource slug to run the benchmark against.' }
      responses:
        '202':
          description: Run started; lands on /runs
          content:
            application/json:
              schema:
                type: object
                required: [runId]
                properties:
                  runId: { type: string }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks verifier role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    Benchmark:
      type: object
      required: [id, name, version, items, kind, updated]
      properties:
        id:      { type: string, example: b_001 }
        name:    { type: string, example: mu-legal-truth }
        version: { type: string, example: v1.4 }
        items:   { type: integer, minimum: 0 }
        kind:    { type: string, enum: [evaluation, safety] }
        updated: { type: string, format: date }

    BenchmarkCreate:
      type: object
      required: [name, kind, version]
      properties:
        name:    { type: string }
        kind:    { type: string, enum: [evaluation, safety] }
        version: { type: string }

    BenchmarkItem:
      type: object
      required: [id, prompt, tags]
      properties:
        id:       { type: string }
        prompt:   { type: string }
        expected: { type: string }
        rubric:   { type: string }
        tags:
          type: array
          items: { type: string }

    VerifierBenchmarksResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/Benchmark' }
        total:       { type: integer }
        generatedAt: { type: string, format: date-time }
