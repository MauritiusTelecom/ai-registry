# Admin · Reviews module — API contract
# Auth: see airegistry-specs/shared/auth.md (admin role required).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Admin Reviews API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: admin-reviews

paths:
  /admin/reviews:
    get:
      summary: List the review queue with stage counters
      operationId: listAdminReviews
      tags: [admin-reviews]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: stage
          schema: { type: string, enum: [all, sovereignty, evaluation, safety] }
        - in: query
          name: priority
          schema: { type: string, enum: [all, high, med, low] }
        - in: query
          name: assigned
          schema: { type: string, description: 'Reviewer email, "unassigned", or "all".' }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Review queue payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminReviewsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      summary: 'New review' header action
      operationId: createAdminReview
      tags: [admin-reviews]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewCreate' }
      responses:
        '201':
          description: Created (assigned defaults to "unassigned")
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }

  /admin/reviews/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a review by id
      operationId: getAdminReview
      tags: [admin-reviews]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Review record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/reviews/{id}/assign:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Assign or reassign a reviewer
      operationId: assignAdminReview
      tags: [admin-reviews]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer]
              properties:
                reviewer: { type: string, description: 'Email of the reviewer or "unassigned".' }
      responses:
        '200':
          description: Updated review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }

  /admin/reviews/{id}/decision:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Close a review with a decision
      operationId: decideAdminReview
      tags: [admin-reviews]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, body]
              properties:
                decision: { type: string, enum: [approve, reject, withdraw] }
                body:     { type: string, minLength: 12 }
      responses:
        '200':
          description: Review closed; row removed from queue
          content:
            application/json:
              schema:
                type: object
                required: [reviewId, auditId]
                properties:
                  reviewId: { type: string }
                  auditId:  { type: string }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks admin role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Review id not found in tenant
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    Review:
      type: object
      required: [id, target, stage, priority, assigned, queued, age]
      properties:
        id:       { type: string, example: rev_8821 }
        target:   { type: string }
        stage:    { type: string, enum: [sovereignty, evaluation, safety] }
        priority: { type: string, enum: [high, med, low] }
        assigned: { type: string }
        queued:   { type: string, format: date }
        age:      { type: string }

    ReviewCreate:
      type: object
      required: [target, stage, priority]
      properties:
        target:   { type: string }
        stage:    { type: string, enum: [sovereignty, evaluation, safety] }
        priority: { type: string, enum: [high, med, low] }

    AdminReviewsResponse:
      type: object
      required: [rows, total, counters, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/Review' }
        total: { type: integer }
        counters:
          type: object
          required: [sovereignty, evaluation, safety]
          properties:
            sovereignty: { type: integer }
            evaluation:  { type: integer }
            safety:      { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
