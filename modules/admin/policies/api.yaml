# Admin · Policies module — API contract
# Auth: see airegistry-specs/shared/auth.md (admin role required).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Admin Policies API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: admin-policies

paths:
  /admin/policies:
    get:
      summary: List active policies
      operationId: listAdminPolicies
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: scope
          schema: { type: string }
        - in: query
          name: enforced
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminPoliciesResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      summary: 'New policy' header action — publishes a new policy at v1.0
      operationId: createAdminPolicy
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PolicyCreate' }
      responses:
        '201':
          description: Policy created (enforced defaults to false / shadow)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Policy' }

  /admin/policies/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get a policy (active version only)
      operationId: getAdminPolicy
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Policy record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Policy' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/policies/{id}/versions:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: List versions of a policy
      operationId: listPolicyVersions
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Versions ordered newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PolicyVersion' }

    post:
      summary: Publish a new version of an existing policy
      operationId: publishPolicyVersion
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PolicyVersionCreate' }
      responses:
        '201':
          description: New version published; active row updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Policy' }

  /admin/policies/{id}/enforce:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Toggle enforcement on the active version
      operationId: setPolicyEnforced
      tags: [admin-policies]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enforced, body]
              properties:
                enforced: { type: boolean }
                body:     { type: string, minLength: 12, description: 'Reason for the change.' }
      responses:
        '200':
          description: Policy enforcement updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Policy' }
        '422':
          description: 'enforced=true rejected because the version has never run in shadow mode for ≥24h.'
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks admin role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Policy id not found in tenant
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    Policy:
      type: object
      required: [id, name, scope, version, updated, enforced]
      properties:
        id:       { type: string, example: pol_egress_default }
        name:     { type: string }
        scope:    { type: string }
        version:  { type: string, example: v3.2 }
        updated:  { type: string, format: date }
        enforced: { type: boolean }

    PolicyVersion:
      type: object
      required: [policyId, version, body, hash, publishedAt, publishedBy]
      properties:
        policyId:    { type: string }
        version:     { type: string }
        body:        { type: string }
        hash:        { type: string }
        publishedAt: { type: string, format: date-time }
        publishedBy: { type: string }

    PolicyCreate:
      type: object
      required: [name, scope, body]
      properties:
        name:  { type: string }
        scope: { type: string }
        body:  { type: string }

    PolicyVersionCreate:
      type: object
      required: [body]
      properties:
        body:        { type: string }
        bumpVersion: { type: string, enum: [minor, major], default: minor }

    AdminPoliciesResponse:
      type: object
      required: [rows, total, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/Policy' }
        total: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
