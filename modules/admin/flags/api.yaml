# Admin · Flags module — API contract
# Auth: see airegistry-specs/shared/auth.md (admin role required).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Admin Flags API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: admin-flags

paths:
  /admin/flags:
    get:
      summary: List flags
      operationId: listAdminFlags
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [all, open, review, resolved] }
        - in: query
          name: severity
          schema: { type: string, enum: [all, high, med, low] }
        - in: query
          name: kind
          schema: { type: string }
        - in: query
          name: target
          schema: { type: string, description: 'Filter by exact resource slug.' }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Flags page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminFlagsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

    post:
      summary: 'Raise flag' header action
      operationId: createAdminFlag
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FlagCreate' }
      responses:
        '201':
          description: Flag created (status defaults to 'open')
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flag' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /admin/flags/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      summary: Get flag by id
      operationId: getAdminFlag
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Flag record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flag' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/flags/{id}/escalate:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Move a flag to 'review' (typically pairs with creating a Review)
      operationId: escalateAdminFlag
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:    { type: string, minLength: 12 }
                reviewId: { type: string, description: 'Optional link to a Review row.' }
      responses:
        '200':
          description: Flag now in 'review'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flag' }

  /admin/flags/{id}/resolve:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Close a flag
      operationId: resolveAdminFlag
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 12 }
      responses:
        '200':
          description: Flag closed
          content:
            application/json:
              schema:
                type: object
                required: [flagId, auditId]
                properties:
                  flagId:  { type: string }
                  auditId: { type: string }

  /admin/flags/{id}/reopen:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      summary: Reopen a resolved flag (status → 'open')
      operationId: reopenAdminFlag
      tags: [admin-flags]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 12 }
      responses:
        '200':
          description: Flag reopened
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flag' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks admin role
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    NotFound:
      description: Flag id not found in tenant
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    BadRequest:
      description: Validation error
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    Flag:
      type: object
      required: [id, target, kind, severity, raisedBy, raised, status]
      properties:
        id:       { type: string, example: flg_001 }
        target:   { type: string }
        kind:     { type: string }
        severity: { type: string, enum: [high, med, low] }
        raisedBy: { type: string }
        raised:   { type: string, format: date }
        status:   { type: string, enum: [open, review, resolved] }

    FlagCreate:
      type: object
      required: [target, kind, severity, body]
      properties:
        target:   { type: string }
        kind:     { type: string }
        severity: { type: string, enum: [high, med, low] }
        body:     { type: string, minLength: 12 }

    AdminFlagsResponse:
      type: object
      required: [rows, total, openCount, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/Flag' }
        total:     { type: integer }
        openCount: { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
