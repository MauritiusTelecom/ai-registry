# Admin · Settings module — API contract
# Auth: see airegistry-specs/shared/auth.md (admin role + scope=global required for all writes).

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Admin Settings API
  version: 0.4.0

servers:
  - url: https://air.gov.mu/api/v1
  - url: https://air-staging.gov.mu/api/v1

tags:
  - name: admin-settings

paths:
  /admin/settings:
    get:
      summary: Get the full settings object
      operationId: getAdminSettings
      tags: [admin-settings]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/settings/identity:
    patch:
      summary: Patch the Identity card
      operationId: patchIdentitySettings
      tags: [admin-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/IdentitySettingsPatch' }
      responses:
        '200':
          description: Updated settings (whole object echoed back)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /admin/settings/sovereignty:
    patch:
      summary: Patch the Sovereignty defaults card
      operationId: patchSovereigntySettings
      tags: [admin-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/SovereigntySettingsPatch' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }

  /admin/settings/audit:
    patch:
      summary: Patch the Audit & retention card
      operationId: patchAuditSettings
      tags: [admin-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/AuditSettingsPatch' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }

  /admin/settings/branding:
    patch:
      summary: Patch the Branding card
      operationId: patchBrandingSettings
      tags: [admin-settings]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema: { $ref: '#/components/schemas/BrandingSettingsPatch' }
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Settings' }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  responses:
    Unauthorized:
      description: Missing or invalid session
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    Forbidden:
      description: Authenticated but lacks admin role / scope
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }
    BadRequest:
      description: Validation error
      content: { application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } } }

  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    IdentitySettings:
      type: object
      required: [primaryIdp, mfaEnforcement, sessionLifetime]
      properties:
        primaryIdp:      { type: string, example: 'gov.mu OIDC' }
        mfaEnforcement:  { type: string, enum: [all, admin] }
        sessionLifetime: { type: string, example: '8h' }

    SovereigntySettings:
      type: object
      required: [defaultTier, egressPosture, dpiaThreshold]
      properties:
        defaultTier:   { type: string, enum: [Tier-1, Tier-2, Tier-3] }
        egressPosture: { type: string, enum: [blocked, logged, open] }
        dpiaThreshold: { type: string, example: 'any-PII' }

    AuditSettings:
      type: object
      required: [retention, notarisationCadence, archiveBucket]
      properties:
        retention:           { type: string, example: '7 years' }
        notarisationCadence: { type: string, example: 'hourly' }
        archiveBucket:       { type: string, example: 's3://air-audit-mu' }

    BrandingSettings:
      type: object
      required: [publicName, supportEmail, statusPage]
      properties:
        publicName:   { type: string, example: 'Sovereign AI Registry' }
        supportEmail: { type: string, format: email, example: 'registry@gov.mu' }
        statusPage:   { type: string, example: 'status.air.gov.mu' }

    Settings:
      type: object
      required: [identity, sovereignty, audit, branding, updatedAt, updatedBy]
      properties:
        identity:    { $ref: '#/components/schemas/IdentitySettings' }
        sovereignty: { $ref: '#/components/schemas/SovereigntySettings' }
        audit:       { $ref: '#/components/schemas/AuditSettings' }
        branding:    { $ref: '#/components/schemas/BrandingSettings' }
        updatedAt:   { type: string, format: date-time }
        updatedBy:   { type: string, format: email }

    IdentitySettingsPatch:
      type: object
      properties:
        primaryIdp:      { type: string }
        mfaEnforcement:  { type: string, enum: [all, admin] }
        sessionLifetime: { type: string }

    SovereigntySettingsPatch:
      type: object
      properties:
        defaultTier:   { type: string, enum: [Tier-1, Tier-2, Tier-3] }
        egressPosture: { type: string, enum: [blocked, logged, open] }
        dpiaThreshold: { type: string }

    AuditSettingsPatch:
      type: object
      properties:
        retention:           { type: string }
        notarisationCadence: { type: string }
        archiveBucket:       { type: string }

    BrandingSettingsPatch:
      type: object
      properties:
        publicName:   { type: string }
        supportEmail: { type: string, format: email }
        statusPage:   { type: string }
