# Public · Ecosystem module — API contract
# Public, unauthenticated, CDN-cacheable.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Public Ecosystem API
  version: 0.4.0

servers:
  - url: https://airegistry.mu/api/v1
  - url: https://staging.airegistry.mu/api/v1

tags:
  - name: public-ecosystem

paths:
  /public/ecosystem:
    get:
      summary: List ecosystem tiers and partner names
      operationId: listPublicEcosystem
      tags: [public-ecosystem]
      responses:
        '200':
          description: Ecosystem payload
          headers:
            Cache-Control:
              schema: { type: string, example: 'public, max-age=3600, stale-while-revalidate=86400' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicEcosystemResponse' }

  /public/ecosystem/{partnerSlug}:
    parameters:
      - in: path
        name: partnerSlug
        required: true
        schema: { type: string }
        description: 'Slug derived from the partner display name (production-only).'
    get:
      summary: Get a partner detail page payload (production-only)
      operationId: getPublicEcosystemPartner
      tags: [public-ecosystem]
      responses:
        '200':
          description: Partner detail (out of scope for v0.4 prototype)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EcosystemPartnerDetail' }
        '404':
          description: Partner not found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    EcosystemTier:
      type: object
      required: [tier, items]
      properties:
        tier:
          type: string
          example: 'Sovereign Operators'
        items:
          type: array
          items: { type: string }

    PublicEcosystemResponse:
      type: object
      required: [tiers, generatedAt]
      properties:
        tiers:
          type: array
          items: { $ref: '#/components/schemas/EcosystemTier' }
        generatedAt: { type: string, format: date-time }

    EcosystemPartnerDetail:
      type: object
      required: [name, tier]
      properties:
        name:    { type: string }
        slug:    { type: string }
        tier:    { type: string }
        domain:  { type: string }
        bio:     { type: string }
        logoUrl: { type: string, format: uri }
        publishedResources:
          type: array
          items:
            type: object
            required: [airId, title]
            properties:
              airId: { type: string }
              title: { type: string }
