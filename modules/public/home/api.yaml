# Public · Home module — API contract
# The public landing page is unauthenticated. All endpoints are read-only,
# CDN-cacheable, and tenant-default-scoped.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Public Home API
  version: 0.4.0
  description: >
    Endpoints that hydrate the public marketing home route. The prototype
    renders entirely client-side from in-memory mock constants; production
    should expose the listed endpoints behind a CDN edge with a 60s cache.

servers:
  - url: https://airegistry.mu/api/v1
  - url: https://staging.airegistry.mu/api/v1

tags:
  - name: public-home

paths:
  /public/metrics:
    get:
      summary: MetricsBar values (six metrics)
      description: Six display-ready metrics for the marquee strip on the home route.
      operationId: getPublicMetrics
      tags: [public-home]
      responses:
        '200':
          description: Metrics payload
          headers:
            Cache-Control:
              schema: { type: string, example: 'public, max-age=60' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicMetrics' }

  /public/registry/featured:
    get:
      summary: Featured registry cards for the home page RegistrySection
      description: A short slice of the public catalog used by the home page; the full
        catalog lives behind /public/registry.
      operationId: getFeaturedRegistry
      tags: [public-home]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 12 }
      responses:
        '200':
          description: Featured registry cards
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RegistryCard' }

  /public/site-config:
    get:
      summary: Site-wide config (branding, footer columns, status)
      description: Used by the shell on every public route, including the home route.
      operationId: getPublicSiteConfig
      tags: [public-home]
      responses:
        '200':
          description: Site config
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicSiteConfig' }

  /public/report:
    post:
      summary: Submit a report against a registry card (ReportModal target)
      description: >
        The home page hosts the global ReportModal that opens when a registry
        card's "Report" action fires. This endpoint accepts the modal submission.
      operationId: submitPublicReport
      tags: [public-home]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportSubmission' }
      responses:
        '202':
          description: Report accepted; thank-you state shown in the modal
          content:
            application/json:
              schema:
                type: object
                required: [reportId]
                properties:
                  reportId: { type: string }

components:
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    PublicMetrics:
      type: object
      required: [metrics]
      properties:
        metrics:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: object
            required: [label, target, trend]
            properties:
              label:  { type: string, example: 'Listed Resources' }
              target: { type: number, example: 247 }
              suffix: { type: string, example: '%' }
              trend:  { type: string, example: '+12 this month' }

    RegistryCard:
      type: object
      required: [airId, kind, title, provider, status, description]
      properties:
        airId:       { type: string, example: 'air://mu/agent/internal/compliance-watch@1.4.0' }
        kind:        { type: string, enum: [model, agent, mcp, tool, workflow] }
        title:       { type: string }
        provider:    { type: string }
        status:      { type: string, enum: [verified, trusted, active, experimental, isolated] }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
        latency:     { type: string }
        context:     { type: string }
        region:      { type: string }
        license:     { type: string }
        glyph:       { type: string }

    PublicSiteConfig:
      type: object
      required: [brand, status, footer]
      properties:
        brand:
          type: object
          required: [name, tagline]
          properties:
            name:    { type: string, example: 'Sovereign Registry' }
            tagline: { type: string }
        status:
          type: object
          required: [operational, slo90d]
          properties:
            operational: { type: boolean }
            slo90d:      { type: string, example: '99.97%' }
        footer:
          type: object
          required: [columns, bottom]
          properties:
            columns:
              type: array
              items:
                type: object
                required: [header, links]
                properties:
                  header: { type: string }
                  links:
                    type: array
                    items:
                      type: object
                      required: [label, href]
                      properties:
                        label: { type: string }
                        href:  { type: string }
            bottom:
              type: object
              required: [copyright, build]
              properties:
                copyright: { type: string }
                build:     { type: string }

    ReportSubmission:
      type: object
      required: [airId, reason, body, email]
      properties:
        airId:  { type: string }
        reason: { type: string, enum: [out-of-date, broken, unsafe, off-topic, other] }
        body:   { type: string, minLength: 12 }
        email:  { type: string, format: email }
