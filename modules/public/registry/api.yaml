# Public · Registry module — API contract
# Public, unauthenticated, CDN-cacheable.

openapi: 3.0.3

info:
  title: Sovereign AI Registry — Public Registry API
  version: 0.4.0

servers:
  - url: https://airegistry.mu/api/v1
  - url: https://staging.airegistry.mu/api/v1

tags:
  - name: public-registry

paths:
  /public/registry:
    get:
      summary: List public registry cards (full catalog)
      description: >
        Returns every registry resource that is publicly listable. Rows with
        status='isolated' MUST be included — the registry's transparency
        principle requires that isolation is itself public.
      operationId: listPublicRegistry
      tags: [public-registry]
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Case-insensitive substring match across title, provider, description, tags, and AIR-ID.
        - in: query
          name: kind
          schema: { type: string, enum: [all, model, agent, skill, tool] }
        - in: query
          name: status
          schema: { type: string, enum: [verified, trusted, active, experimental, isolated] }
          description: Single-status filter; absent means any status.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Registry page
          headers:
            Cache-Control:
              schema: { type: string, example: 'public, max-age=60, stale-while-revalidate=300' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicRegistryResponse' }

  /public/registry/{airId}:
    parameters:
      - in: path
        name: airId
        required: true
        schema: { type: string }
        description: 'AIR-ID, URL-encoded, e.g. air%3A%2F%2Fmu%2Fagent%2Finternal%2Fcompliance-watch%401.4.0'
    get:
      summary: Get a single registry card
      operationId: getPublicRegistryCard
      tags: [public-registry]
      responses:
        '200':
          description: Card detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistryCardDetail' }
        '404':
          description: Card not found OR not publicly listable
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /public/registry/counts:
    get:
      summary: Per-kind counts for the kind tab pills
      operationId: getPublicRegistryCounts
      tags: [public-registry]
      responses:
        '200':
          description: Counts payload
          content:
            application/json:
              schema:
                type: object
                required: [all, model, agent, skill, tool]
                properties:
                  all:    { type: integer }
                  model:  { type: integer }
                  agent:  { type: integer }
                  skill:  { type: integer }
                  tool:   { type: integer }

components:
  schemas:
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }

    RegistryCard:
      type: object
      required: [id, airId, kind, glyph, title, provider, status, desc, context, latency, region, license, tags]
      properties:
        id:       { type: string, example: gpt4o }
        airId:    { type: string, example: 'air://global/model/openai/gpt-4o@2025-09' }
        kind:     { type: string, enum: [model, agent, skill, tool] }
        glyph:    { type: string, minLength: 2, maxLength: 4 }
        title:    { type: string }
        provider: { type: string }
        status:   { type: string, enum: [verified, trusted, active, experimental, isolated] }
        desc:     { type: string }
        context:  { type: string }
        latency:  { type: string }
        region:   { type: string }
        license:  { type: string }
        tags:
          type: array
          items: { type: string }
          uniqueItems: true

    RegistryCardDetail:
      allOf:
        - $ref: '#/components/schemas/RegistryCard'
        - type: object
          properties:
            sovereigntyReview:
              type: object
              properties:
                reviewedAt: { type: string, format: date }
                reviewer:   { type: string }
                rubric:     { type: string }
                outcome:    { type: string, enum: [approved, conditional, rejected] }
            providerVerification:
              type: object
              properties:
                verifiedAt: { type: string, format: date }
                method:     { type: string, enum: [dns-txt, signed-manifest, https-callback, email] }
            auditTrailUrl:
              type: string
              format: uri

    PublicRegistryResponse:
      type: object
      required: [rows, total, counts, generatedAt]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/RegistryCard' }
        total: { type: integer }
        counts:
          type: object
          required: [all, model, agent, skill, tool]
          properties:
            all:    { type: integer }
            model:  { type: integer }
            agent:  { type: integer }
            skill:  { type: integer }
            tool:   { type: integer }
        page:
          type: object
          properties:
            cursor:  { type: string }
            size:    { type: integer }
            hasMore: { type: boolean }
        generatedAt: { type: string, format: date-time }
